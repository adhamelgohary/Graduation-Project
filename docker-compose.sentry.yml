version: '3.8'

services:
  sentry_postgres:
    image: postgres:16-alpine
    container_name: sentry_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sentry
      POSTGRES_USER: sentry
      POSTGRES_PASSWORD: sentrypassword
    volumes:
      - sentry_pgdata:/var/lib/postgresql/data
    networks:
      - sentry_network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "sentry"]
      interval: 10s
      timeout: 5s
      retries: 5

  sentry_redis:
    image: redis:7-alpine
    container_name: sentry_redis
    restart: unless-stopped
    volumes:
      - sentry_redis_data:/data
    networks:
      - sentry_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  sentry:
    image: getsentry/self-hosted:25.4.0
    container_name: sentry_sentry
    restart: unless-stopped
    depends_on:
      sentry_postgres:
        condition: service_healthy
      sentry_redis:
        condition: service_healthy
    environment:
      SENTRY_SECRET_KEY: ${SENTRY_SECRET_KEY:-change-this-secret-key-in-production}
      SENTRY_POSTGRES_HOST: sentry_postgres
      SENTRY_DB_USER: sentry
      SENTRY_DB_PASSWORD: sentrypassword
      SENTRY_DB_NAME: sentry
      SENTRY_REDIS_HOST: sentry_redis
    volumes:
      - sentry_data:/var/lib/sentry
    ports:
      - "${SENTRY_PORT:-9000}:9000"
    networks:
      - sentry_network

volumes:
  sentry_pgdata:
  sentry_redis_data:
  sentry_data:

networks:
  sentry_network:
    driver: bridge