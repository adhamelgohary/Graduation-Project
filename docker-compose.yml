services:
  db:
    image: mysql:8.0
    container_name: health_guide_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-Health_Guide}
      MYSQL_USER: ${MYSQL_USER:-healthguide}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-healthguide123}
    volumes:
      - db_data:/var/lib/mysql
      - ./Health_Guide.sql:/docker-entrypoint-initdb.d/1.sql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - health_guide_network

  web:
    build: .
    container_name: health_guide_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: ${MYSQL_DATABASE:-Health_Guide}
      MYSQL_USER: ${MYSQL_USER:-healthguide}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-healthguide123}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-change-this-in-production}
      FLASK_RUN_PORT: ${FLASK_RUN_PORT:-54321}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./static:/app/static
      - ./logs:/app/logs
    ports:
      - "${FLASK_RUN_PORT:-54321}:${FLASK_RUN_PORT:-54321}"
    networks:
      - health_guide_network

volumes:
  db_data:

networks:
  health_guide_network:
    driver: bridge