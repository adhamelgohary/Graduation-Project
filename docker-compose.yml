version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: health_guide_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: Health_Guide
      MYSQL_USER: healthguide
      MYSQL_PASSWORD: healthguide123
    volumes:
      - db_data:/var/lib/mysql
      - ./Health_Guide.sql:/docker-entrypoint-initdb.d/1.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: health_guide_web
    restart: unless-stopped
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: Health_Guide
      MYSQL_USER: healthguide
      MYSQL_PASSWORD: healthguide123
      FLASK_SECRET_KEY: your-secret-key-change-in-production
      FLASK_RUN_PORT: 54321
    volumes:
      - ./static:/app/static
    ports:
      - "54321:54321"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - health_guide_network

volumes:
  db_data:

networks:
  health_guide_network:
    driver: bridge